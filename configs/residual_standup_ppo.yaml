defaults:
  - env: pixels
  - env_size: custom
  - learning:
      - ppo-base
      - ppo-rnn
  - misc: misc
  - eval: eval_auto
  - train_levels: standup
  - model:
      - model-base
      - model-transformer
      - model-perm-invariant-mlp
  - _self_

env:
  action_type: continuous
  observation_type: pixels
  dense_reward_scale: 1.0
  dummy_env: false
  residual_torque_limit_nm: 2.5
  total_torque_limit_nm: 20.0
  energy_penalty_coefficient: 0.001
  underlying_controller: pd
  # Sample independent per-joint controller parameters once per episode.
  # 0.2 gives uniform values between 80% and 120% of each nominal value.
  pd_gain_randomization_fraction: 0.2
  bang_bang_torque_randomization_fraction: 0.2
  # Add independent zero-mean noise to each active controller torque per step.
  controller_torque_noise_std_nm: 0.2
  # While the end effector is inside the goal, reward accumulates linearly at
  # this rate even if the arm is not yet steady. One second inside gives +1.
  goal_inside_reward_per_second: 1.0
  # Succeed after the complete movable arm remains within the relaxed velocity
  # thresholds and its end effector stays inside the goal for half a second.
  goal_hold_duration_seconds: 0.5
  goal_linear_velocity_threshold_mps: 0.2
  goal_angular_velocity_threshold_rad_s: 0.2

env_size:
  custom_path: l/standup_goal.json
  env_size_type: custom
  env_size_name: custom
  frame_skip: 1

learning:
  # 256 PPO updates: 64 environments x 64 steps x 256 = 1,048,576.
  total_timesteps: 1048576
  num_train_envs: 64
  num_steps: 64
  num_minibatches: 8
  update_epochs: 4

misc:
  use_wandb: false
  save_policy: true
  save_path: checkpoints/dynak/residual_standup
  final_checkpoint_path: checkpoints/dynak/residual_standup/final.pbz2
  checkpoint_save_freq: 64
  should_log_videos: false

eval:
  eval_levels: auto
  eval_num_attempts: 1
  eval_freq: 0
  EVAL_ON_SAMPLED: false

model:
  recurrent_model: false

seed: 0
